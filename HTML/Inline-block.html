<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../CSS/Inline-block.css">
</head>
<body>

<h3>display: inline</h3>
<span class="inline">One</span>
<span class="inline">Two</span>
<span class="inline">Three</span>

<h3>display: block</h3>
<span class="block">One</span>
<span class="block">Two</span>
<span class="block">Three</span>

<h3>display: inline-block</h3>
<span class="inline-block">One</span>
<span class="inline-block">Two</span>
<span class="inline-block">Three</span>

</body>
</html>
