<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../CSS/Overflow.css">
</head>
<body>

<div class="box scroll-box">
  <p>This box has a lot of content. When it overflows, a scrollbar appears automatically. This is useful for content areas with variable length.</p>
</div>

<div class="box clip-box">
  <p>This box clips any content that overflows. The extra content is hidden and not accessible to the user.</p>
</div>

</body>
</html>
